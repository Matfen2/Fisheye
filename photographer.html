<!DOCTYPE html>
<html lang="fr">
  <head>
    <link href="css/style.css" rel="stylesheet" type="text/css" />
    <meta charset="utf-8" />
    <link rel="icon" type="image/png" href="assets/favicon.png" />
    <link href="https://fonts.googleapis.com/css?family=DM+Sans&display=swap" rel="stylesheet" />
    <title>Fisheye - photographe</title>
  </head>
  <body>
    <header>
      <a href="index.html">
        <img src="assets/images/logo.png" class="logo" alt="fisheye logo" />
      </a>
    </header>

    <main id="main">
      <div class="photograph-header">
        <button class="contact_button" onclick="displayModal()">Contactez-moi</button>
      </div>
    </main>

    <!-- MODALE DE CONTACT -->
    <div id="contact_modal">
      <div class="modal">
        <header>
          <h2 id="modal-title">Contactez-moi</h2>
          <img src="assets/icons/close.svg" onclick="closeModal()" alt="Fermer" />
        </header>
        <form>
          <div>
            <label for="first">Prénom</label>
            <input id="first" name="first" type="text" required />
            <span class="error-message"></span>
          </div>
          <div>
            <label for="last">Nom</label>
            <input id="last" name="last" type="text" required />
            <span class="error-message"></span>
          </div>
          <div>
            <label for="email">Email</label>
            <input id="email" name="email" type="email" required />
            <span class="error-message"></span>
          </div>
          <div>
            <label for="message">Votre message</label>
            <textarea id="message" name="message" rows="5" required></textarea>
            <span class="error-message"></span>
          </div>
          <button class="contact_button" type="submit">Envoyer</button>
        </form>
      </div>
    </div>

    <script src="scripts/templates/photographer.js"></script>
    <script src="scripts/pages/photographer.js"></script>
    <script src="scripts/utils/contactForm.js"></script>
  </body>
</html>
